name: Frontend CI/CD

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - tst
          - prd

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-tst:
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/develop') || (github.event_name == 'workflow_dispatch' && inputs.target == 'tst') }}
    runs-on: ubuntu-latest
    environment: tst
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build tst
        run: npm run build -- --configuration tst

      - name: Validate tst deployment token
        run: |
          if [ -z "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" ] && [ -z "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_TST }}" ]; then
            echo "Missing deployment token for tst."
            echo "Set one of these secrets:"
            echo "- Environment secret (recommended): AZURE_STATIC_WEB_APPS_API_TOKEN on environment 'tst'"
            echo "- Repository secret: AZURE_STATIC_WEB_APPS_API_TOKEN_TST"
            exit 1
          fi

      - name: Deploy to Azure Static Web Apps (tst)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_TST }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          output_location: dist/cookboek/browser
          skip_app_build: true

  deploy-prd:
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.target == 'prd') }}
    runs-on: ubuntu-latest
    environment: prd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build prd
        run: npm run build -- --configuration prd

      - name: Validate prd deployment token
        run: |
          if [ -z "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" ] && [ -z "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PRD }}" ]; then
            echo "Missing deployment token for prd."
            echo "Set one of these secrets:"
            echo "- Environment secret (recommended): AZURE_STATIC_WEB_APPS_API_TOKEN on environment 'prd'"
            echo "- Repository secret: AZURE_STATIC_WEB_APPS_API_TOKEN_PRD"
            exit 1
          fi

      - name: Deploy to Azure Static Web Apps (prd)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PRD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          output_location: dist/cookboek/browser
          skip_app_build: true

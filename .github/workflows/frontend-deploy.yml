name: Frontend Deploy

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - tst
          - prd
      approve_prod:
        description: 'I approve production deployment'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-tst:
    if: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && (inputs.target == 'tst' || inputs.target == 'prd')) }}
    runs-on: ubuntu-latest
    environment: tst
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build tst
        run: npm run -w frontend build -- --configuration tst

      - name: Validate tst web app settings
        run: |
          if [ -z "${{ vars.AZURE_WEBAPP_NAME }}" ] && [ -z "${{ vars.AZURE_WEBAPP_NAME_TST }}" ]; then
            echo "Missing web app name for tst."
            echo "Set one of these variables:"
            echo "- Environment variable (recommended): AZURE_WEBAPP_NAME on environment 'tst'"
            echo "- Repository variable: AZURE_WEBAPP_NAME_TST"
            exit 1
          fi

          if [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ] && [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_TST }}" ]; then
            echo "Missing publish profile for tst."
            echo "Set one of these secrets:"
            echo "- Environment secret (recommended): AZURE_WEBAPP_PUBLISH_PROFILE on environment 'tst'"
            echo "- Repository secret: AZURE_WEBAPP_PUBLISH_PROFILE_TST"
            exit 1
          fi

      - name: Deploy to Azure Web App (tst)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME || vars.AZURE_WEBAPP_NAME_TST }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE || secrets.AZURE_WEBAPP_PUBLISH_PROFILE_TST }}
          package: frontend/dist/cookboek/browser

  deploy-prd:
    needs: [deploy-tst]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'prd' && inputs.approve_prod && needs.deploy-tst.result == 'success' }}
    runs-on: ubuntu-latest
    environment: prd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build prd
        run: npm run -w frontend build -- --configuration prd

      - name: Validate prd web app settings
        run: |
          if [ -z "${{ vars.AZURE_WEBAPP_NAME }}" ] && [ -z "${{ vars.AZURE_WEBAPP_NAME_PRD }}" ]; then
            echo "Missing web app name for prd."
            echo "Set one of these variables:"
            echo "- Environment variable (recommended): AZURE_WEBAPP_NAME on environment 'prd'"
            echo "- Repository variable: AZURE_WEBAPP_NAME_PRD"
            exit 1
          fi

          if [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ] && [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PRD }}" ]; then
            echo "Missing publish profile for prd."
            echo "Set one of these secrets:"
            echo "- Environment secret (recommended): AZURE_WEBAPP_PUBLISH_PROFILE on environment 'prd'"
            echo "- Repository secret: AZURE_WEBAPP_PUBLISH_PROFILE_PRD"
            exit 1
          fi

      - name: Deploy to Azure Web App (prd)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME || vars.AZURE_WEBAPP_NAME_PRD }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE || secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PRD }}
          package: frontend/dist/cookboek/browser
